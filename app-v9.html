<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VRT v9 — MediaInfo</title><style>
:root{--bg:#0e1016;--card:#161b27;--hi:#1d2437;--bd:#28334a;--txt:#dde3f0;--dim:#8490a8;--acc:#4b7bec;--gold:#f5c842;--green:#2ecc8a;--red:#f04b4b;--mono:ui-monospace,Cascadia Code,monospace;--sans:system-ui,Segoe UI,sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--txt);padding:28px 14px 70px}#app{max-width:820px;margin:auto;display:flex;flex-direction:column;gap:16px}.card,#drop{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:20px}header{display:flex;justify-content:space-between;align-items:center;gap:12px}.badge{font:11px var(--mono);color:var(--green);border:1px solid rgba(46,204,138,.4);border-radius:99px;padding:5px 10px;white-space:nowrap}.dim{font-size:12px;color:var(--dim)}h1{font-size:20px}#drop{text-align:center;border-style:dashed}.icon{font-size:42px;margin-bottom:10px}.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px}.btn{background:var(--hi);color:var(--txt);border:1px solid var(--bd);border-radius:8px;padding:9px 15px;font-weight:700;cursor:pointer}.primary{background:var(--acc);border:0;color:white}.danger{color:var(--red);background:rgba(240,75,75,.12);border-color:rgba(240,75,75,.35)}#legacy{display:none}[hidden]{display:none!important}.bar{height:8px;background:var(--hi);border-radius:99px;overflow:hidden;margin:12px 0 8px}.fill{height:100%;width:0;background:linear-gradient(90deg,#4b7bec,#6d95ff);transition:.2s}.fill.done{background:linear-gradient(90deg,var(--green),#5fedb0)}.meta{display:flex;justify-content:space-between;color:var(--dim);font-size:12px}#file{font:11px var(--mono);color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:16px;margin-top:7px}.total{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.3);border-radius:12px;text-align:center;padding:20px}.tc{font:700 clamp(34px,10vw,58px) var(--mono);color:var(--gold);letter-spacing:3px}.warn{padding:10px 12px;border-radius:8px;background:rgba(240,75,75,.12);color:var(--red);font-size:13px;margin:12px 0}.ok{padding:10px 12px;border-radius:8px;background:rgba(46,204,138,.09);color:var(--green);font-size:13px;margin:12px 0}table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}td,th{border-bottom:1px solid var(--bd);padding:8px;text-align:left}th{font-size:11px;color:var(--dim);text-transform:uppercase}.dur{text-align:right;font-family:var(--mono);color:var(--gold)}.fail{color:var(--red)}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--hi);border:1px solid var(--bd);border-radius:99px;padding:10px 18px;opacity:0;transition:.2s}.show{opacity:1!important}
</style></head><body><div id="app"><header><div><h1>Video Runtime Tracker</h1><p class="dim">v9 reads metadata with MediaInfo when Chrome cannot decode a file. No uploads.</p></div><span class="badge">v9 MediaInfo</span></header><div id="drop"><div class="icon">📂</div><b>Drop a video folder here</b><p class="dim">or choose one below</p><div class="row"><button class="btn primary" id="choose">📁 Choose Folder</button><label class="btn" for="legacy">🗂 Legacy Picker</label><input type="file" id="legacy" webkitdirectory directory multiple></div><p class="dim" id="note" style="margin-top:10px"></p></div><section class="card" id="scan" hidden><div style="display:flex;justify-content:space-between;gap:10px"><b id="folder">Scanning…</b><button class="btn danger" id="cancel">✕ Cancel</button></div><div class="bar"><div class="fill" id="fill"></div></div><div class="meta"><span id="count">0 / 0</span><span id="eta"></span></div><div id="file"></div></section><section class="card" id="results" hidden><div class="total"><p class="dim">Total Runtime</p><div class="tc" id="runtime">00:00:00</div><p class="dim" id="sub"></p></div><div id="notice"></div><div class="row"><button class="btn primary" id="csv">⬇ Export CSV</button><button class="btn" id="copy">📋 Copy</button><button class="btn" id="new">🔄 New Scan</button></div><table><thead><tr><th>Filename</th><th class="dur">Duration</th><th>Status</th></tr></thead><tbody id="body"></tbody></table></section></div><div id="toast"></div><script>
const BUILD='v9-mediainfo',SCAN_CONCURRENCY=4,BROWSER_TIMEOUT=2500,MI_INIT_TIMEOUT=12000,MI_FILE_TIMEOUT=7000;
const VIDEO=new Set('3g2,3gp,asf,avi,divx,dv,f4v,flv,m2ts,m4v,m4b,m4p,mkv,mod,mov,mp4,mpe,mpeg,mpg,mts,mxf,ogm,ogv,rm,rmvb,tod,ts,vob,webm,wm,wmv'.split(','));
const DOC=new Set('pdf,txt,rtf,doc,docx,odt,pages,xls,xlsx,ods,csv,ppt,pptx,odp,key,json,xml,html,htm,md,zip,rar,7z'.split(','));
const $=id=>document.getElementById(id), S={scanning:false,cancel:false,results:null};
$('note').textContent=window.showDirectoryPicker?'Use this page instead of the old cached app. First run may load MediaInfo once.':'Use Legacy Picker in this browser.'; cleanup();
async function cleanup(){try{if('caches'in window){let k=await caches.keys();await Promise.all(k.filter(x=>x.startsWith('vrt-')).map(x=>caches.delete(x)))}}catch{}try{if('serviceWorker'in navigator){let r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()))}}catch{}}
function ext(f){let n=(f?.name||'').toLowerCase(),d=n.lastIndexOf('.');return d<0||d===n.length-1?'':n.slice(d+1)} function pth(f){return f.webkitRelativePath||f.name||'unknown'}
function should(f){let e=ext(f),m=(f.type||'').toLowerCase();if(m.startsWith('video/')||VIDEO.has(e))return true;if(m==='application/pdf'||DOC.has(e))return false;return!m||m==='application/octet-stream'||m.startsWith('application/')}
function timeout(p,ms,msg){let t;return Promise.race([p.finally(()=>clearTimeout(t)),new Promise((_,rej)=>{t=setTimeout(()=>rej(Error(msg)),ms)})])}
function loadScript(src){return timeout(new Promise((res,rej)=>{let s=document.createElement('script');s.src=src;s.async=true;s.onload=()=>res(src);s.onerror=()=>rej(Error('load failed'));document.head.appendChild(s)}),MI_INIT_TIMEOUT,'MediaInfo load timeout')}
let miPromise=null,miDisabled=false,miQueue=Promise.resolve();
async function getMI(){if(miDisabled)return null;if(miPromise)return miPromise;miPromise=(async()=>{for(const src of ['https://cdn.jsdelivr.net/npm/mediainfo.js/dist/mediainfo.min.js','https://unpkg.com/mediainfo.js/dist/mediainfo.min.js']){try{await loadScript(src);let factory=window.MediaInfo||window.MediaInfoFactory;if(typeof factory!=='function')throw Error('factory missing');let base=src.slice(0,src.lastIndexOf('/')+1),opts={format:'object',locateFile:f=>base+f};let inst=await timeout(new Promise((res,rej)=>{try{let out=factory(opts,res,rej);if(out?.then)out.then(res,rej);else if(out?.analyzeData)res(out)}catch(e){rej(e)}}),MI_INIT_TIMEOUT,'MediaInfo init timeout');if(inst?.analyzeData)return inst}catch(e){console.warn('[VRT] MediaInfo source failed',src,e)}}miDisabled=true;return null})().catch(e=>{console.warn('[VRT] MediaInfo unavailable',e);miDisabled=true;return null});return miPromise}
function parseTime(s){s=String(s||'').trim();let m=s.match(/^(?:(\d+):)?(\d{1,2}):(\d{2})(?:[.,](\d+))?$/);if(!m)return null;let d=Number(m[1]||0)*3600+Number(m[2])*60+Number(m[3])+(m[4]?Number('0.'+m[4]):0);return d>0?d:null}
function durationFromMI(r){let tracks=r?.media?.track||r?.tracks||[],arr=Array.isArray(tracks)?tracks:[tracks],objs=[arr.find(t=>String(t['@type']||t.type||'').toLowerCase()==='general'),...arr,r].filter(Boolean);for(const o of objs)for(const k of ['Duration_String3','Duration/String3','Duration_String4','Duration/String4','Duration_String5','Duration/String5']){let d=parseTime(o[k]);if(d)return d}for(const o of objs)for(const [k,v]of Object.entries(o)){if(!/duration/i.test(k)||/string/i.test(k))continue;let n=Number(String(v).replace(/[^0-9.]/g,''));if(n>0&&isFinite(n))return n>86400?n/1000:n}return null}
async function mediaInfoDuration(f){let mi=await getMI();if(!mi)return null;miQueue=miQueue.then(async()=>{let getSize=()=>f.size,readChunk=async(size,offset)=>new Uint8Array(await f.slice(offset,offset+size).arrayBuffer());let r=await timeout(mi.analyzeData(getSize,readChunk),MI_FILE_TIMEOUT,'MediaInfo file timeout');return durationFromMI(r)});return miQueue.catch(e=>{console.warn('[VRT] MediaInfo failed',f.name,e);return null})}
function browserDuration(f){return new Promise(res=>{let u=URL.createObjectURL(f),v=document.createElement('video'),done=false;v.preload='metadata';v.muted=true;v.playsInline=true;let finish=d=>{if(done)return;done=true;clearTimeout(t);v.onloadedmetadata=v.ondurationchange=v.onerror=null;v.removeAttribute('src');try{v.load()}catch{}URL.revokeObjectURL(u);res(d&&isFinite(d)&&d>0?d:null)};let read=()=>finish(v.duration);let t=setTimeout(()=>finish(null),BROWSER_TIMEOUT);v.onloadedmetadata=read;v.ondurationchange=read;v.onerror=()=>finish(null);v.src=u;v.load()})}
async function readDur(f){let d=await mediaInfoDuration(f);if(d)return{duration:d,success:true,mode:'mediainfo'};d=await browserDuration(f);if(d)return{duration:d,success:true,mode:'browser'};return{duration:0,success:false,mode:miDisabled?'browser-failed':'unreadable'}}
async function collectHandle(h,d){let out=[];for await(const[,e]of h.entries()){try{if(e.kind==='file'){let f=await e.getFile();d.total++;should(f)?out.push(f):d.ignored++}else if(e.kind==='directory')out.push(...await collectHandle(e,d))}catch{d.ignored++}}return out}
function readEntry(e,d){return new Promise(res=>{if(e.isFile){e.file(f=>{d.total++;should(f)?res([f]):(d.ignored++,res([]))},()=>{d.ignored++;res([])});return}if(!e.isDirectory)return res([]);let r=e.createReader(),all=[];(function loop(){r.readEntries(async b=>{if(!b.length){let o=[];for(const x of all)o.push(...await readEntry(x,d));res(o)}else{all.push(...b);loop()}},()=>res([]))})()})}
$('choose').onclick=async()=>{if(S.scanning)return;if(!showDirectoryPicker){$('legacy').click();return}try{let h=await showDirectoryPicker({mode:'read'}),d={total:0,ignored:0},files=await collectHandle(h,d);start(files,h.name,d)}catch(e){if(e.name!=='AbortError')toast('Could not open folder')}};
$('legacy').onchange=e=>{let all=[...(e.target.files||[])],files=all.filter(should),name=files[0]?.webkitRelativePath?.split('/')[0]||'Selected Folder';start(files,name,{total:all.length,ignored:all.length-files.length});e.target.value=''};
let drop=$('drop');['dragenter','dragover'].forEach(x=>drop.addEventListener(x,e=>{e.preventDefault();drop.classList.add('drop-active')}));['dragleave','dragend','drop'].forEach(x=>drop.addEventListener(x,()=>drop.classList.remove('drop-active')));drop.ondrop=async e=>{e.preventDefault();if(S.scanning)return;let d={total:0,ignored:0},items=[...(e.dataTransfer.items||[])];try{if(items[0]?.getAsFileSystemHandle){let h=await items[0].getAsFileSystemHandle();if(h.kind==='directory')return start(await collectHandle(h,d),h.name,d)}let ent=items[0]?.webkitGetAsEntry?.();if(ent?.isDirectory)return start(await readEntry(ent,d),ent.name,d);toast('Drop a folder, not files')}catch{toast('Could not read folder')}};
$('cancel').onclick=()=>S.cancel=true;$('new').onclick=()=>{$('results').hidden=true;S.results=null};$('csv').onclick=csv;$('copy').onclick=copy;
async function start(files,name,disc){if(!files.length)return toast('No videos found');S.scanning=true;S.cancel=false;S.results=null;$('scan').hidden=false;$('results').hidden=true;$('folder').textContent=name;$('fill').style.width='0%';$('fill').classList.remove('done');$('count').textContent=`0 / ${files.length} videos`;$('eta').textContent='';$('file').textContent=`Found ${disc.total} files · scanning ${files.length} · ignored ${disc.ignored}`;let begin=Date.now(),next=0,done=0,out=[];async function slot(){while(!S.cancel&&next<files.length){let f=files[next++];$('file').textContent=pth(f);let r=await readDur(f);out.push({name:pth(f),ext:ext(f),size:f.size||0,duration:r.duration,success:r.success,mode:r.mode});done++;let elapsed=Math.max(.001,(Date.now()-begin)/1000),eta=Math.round((files.length-done)/(done/elapsed));$('fill').style.width=Math.round(done/files.length*100)+'%';$('count').textContent=`${done} / ${files.length} videos`;$('eta').textContent=done<files.length?`ETA: ${fmtEta(eta)}`:`Elapsed: ${fmtEta(Math.round(elapsed))}`}}await Promise.all(Array.from({length:Math.min(SCAN_CONCURRENCY,files.length)},slot));S.scanning=false;if(S.cancel){$('scan').hidden=true;return toast('Cancelled')}let elapsed=Math.round((Date.now()-begin)/1000),total=out.reduce((s,f)=>s+(f.success?f.duration:0),0),failed=out.filter(f=>!f.success).length;S.results={name,disc,files:out,total,failed,elapsed,build:BUILD};show()}
function show(){let r=S.results;$('scan').hidden=true;$('results').hidden=false;$('runtime').textContent=fmtTC(r.total);$('sub').textContent=`${r.name} · ${r.files.length} videos/candidates · found ${r.disc.total} files, ignored ${r.disc.ignored}${r.failed?' · '+r.failed+' failed':''} · scanned in ${fmtEta(r.elapsed)}`;$('notice').innerHTML=r.failed?`<div class="warn">${r.failed} file(s) still failed. Export CSV and send failed rows.</div>`:'<div class="ok">All video durations were read.</div>';$('body').innerHTML=[...r.files].sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<tr><td title="${esc(f.name)}">${esc(f.name)}</td><td class="dur ${f.success?'':'fail'}">${f.success?fmtTC(f.duration):'—'}</td><td class="${f.success?'':'fail'}">${f.success?'ok':'failed'} · .${esc(f.ext)} · ${esc(f.mode)}</td></tr>`).join('')}
function csv(){let r=S.results;if(!r)return;let rows=[['Filename','Extension','Size bytes','Duration seconds','Duration H:MM:SS','Status','Mode']];r.files.forEach(f=>rows.push([f.name,f.ext,f.size,f.success?f.duration.toFixed(3):'',f.success?fmtTC(f.duration):'',f.success?'ok':'failed',f.mode]));let text=rows.map(row=>row.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/csv'}));a.download=(r.name||'scan')+'_runtime_v9.csv';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function copy(){let r=S.results;if(!r)return;let text=`${r.name}\nRuntime: ${fmtTC(r.total)}\nVideos: ${r.files.length}\nFailed: ${r.failed}\nBuild: ${r.build}`;try{await navigator.clipboard.writeText(text);toast('Copied')}catch{toast('Copy failed')}}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function fmtTC(x){let h=Math.floor(x/3600),m=Math.floor((x%3600)/60),s=Math.floor(x%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}function fmtEta(s){return!isFinite(s)?'':s<60?`${s}s`:`${Math.floor(s/60)}m ${s%60}s`}function toast(m){let t=$('toast');t.textContent=m;t.className='show';setTimeout(()=>t.className='',2500)}
</script></body></html>

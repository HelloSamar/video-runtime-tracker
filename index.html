<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0e1016">
  <meta name="description" content="Calculate the total runtime of any local video folder — 100% in-browser, no uploads, no server.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>VRT — Video Runtime Tracker</title>

  <style>
    /* ── Tokens ───────────────────────────────────────────────────────────── */
    :root {
      --bg:         #0e1016;
      --surface:    #161b27;
      --surface-hi: #1d2437;
      --border:     #28334a;
      --text:       #dde3f0;
      --text-dim:   #5e6e8a;
      --accent:     #4b7bec;
      --accent-h:   #6890f5;
      --accent-glo: rgba(75,123,236,.18);
      --gold:       #f5c842;
      --gold-bg:    rgba(245,200,66,.09);
      --gold-border:rgba(245,200,66,.35);
      --green:      #2ecc8a;
      --red:        #f04b4b;
      --red-bg:     rgba(240,75,75,.12);
      --mono:       ui-monospace,'Cascadia Code','Fira Code',monospace;
      --sans:       system-ui,-apple-system,'Segoe UI',sans-serif;
      --r:          12px;
      --r-sm:       8px;
      --transition: .18s ease;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #eef1f7;
        --surface:    #ffffff;
        --surface-hi: #f4f7ff;
        --border:     #d0d8eb;
        --text:       #1c2340;
        --text-dim:   #7889a8;
        --accent:     #3a66d9;
        --accent-h:   #2a54c4;
        --accent-glo: rgba(58,102,217,.12);
        --gold:       #a0740a;
        --gold-bg:    rgba(160,116,10,.07);
        --gold-border:rgba(160,116,10,.3);
        --green:      #1a9a63;
        --red:        #d63030;
        --red-bg:     rgba(214,48,48,.08);
      }
    }

    /* ── Reset & base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px 80px;
    }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    #app {
      max-width: 660px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-img {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.3px;
      line-height: 1.2;
    }
    .tagline {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    #installBtn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
      padding: 6px 12px;
      border-radius: var(--r-sm);
      cursor: pointer;
      white-space: nowrap;
      transition: background var(--transition), color var(--transition);
      flex-shrink: 0;
    }
    #installBtn:hover { background: var(--surface-hi); color: var(--text); }
    #installBtn[hidden] { display: none; }

    /* ── Card ─────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    /* ── Drop zone ────────────────────────────────────────────────────────── */
    #dropZone {
      border: 2px dashed var(--border);
      border-radius: var(--r);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition), transform var(--transition);
      background: var(--surface);
    }
    #dropZone:hover, #dropZone.drag-active {
      border-color: var(--accent);
      background: var(--accent-glo);
    }
    #dropZone.drag-active { transform: scale(1.01); }
    .drop-icon {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 14px;
      transition: transform var(--transition);
    }
    #dropZone.drag-active .drop-icon { transform: scale(1.15); }
    .drop-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .drop-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: var(--r-sm);
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
      white-space: nowrap;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-ghost {
      background: var(--surface-hi);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--border); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid transparent; }
    .btn-danger:hover:not(:disabled) { background: var(--red); color: #fff; }
    .btn-icon {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 14px;
      line-height: 1;
      transition: color var(--transition), background var(--transition);
    }
    .btn-icon:hover { color: var(--red); background: var(--red-bg); }
    .btn-icon.rescan:hover { color: var(--accent); background: var(--accent-glo); }
    #legacyInput { display: none; }
    label.btn { display: inline-flex; }
    .fsapi-note {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Scan progress ────────────────────────────────────────────────────── */
    #scanSection[hidden] { display: none; }
    .scan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .scan-folder {
      font-weight: 600;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 360px;
    }
    .progress-track {
      width: 100%;
      height: 8px;
      background: var(--surface-hi);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4b7bec, #6890f5);
      border-radius: 99px;
      transition: width .25s ease;
      box-shadow: 0 0 10px rgba(75,123,236,.5);
    }
    .progress-fill.done {
      background: linear-gradient(90deg, var(--green), #5fedb0);
      box-shadow: 0 0 10px rgba(46,204,138,.5);
    }
    .scan-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
    }
    .scan-file {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      height: 16px;
    }
    .scan-eta { color: var(--accent); font-weight: 600; }

    /* ── Results ──────────────────────────────────────────────────────────── */
    #resultsSection[hidden] { display: none; }
    .tc-wrap {
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      border-radius: var(--r);
      padding: 24px;
      text-align: center;
      margin-bottom: 16px;
    }
    .tc-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }
    .tc-value {
      font-family: var(--mono);
      font-size: clamp(40px, 10vw, 64px);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 4px;
      line-height: 1;
    }
    .tc-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 10px;
    }
    .results-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .results-actions .btn { flex: 1; min-width: 120px; justify-content: center; }

    /* ── File table ───────────────────────────────────────────────────────── */
    #tableToggle {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 12px;
      transition: color var(--transition);
    }
    #tableToggle:hover { color: var(--text); }
    #tableToggle .chevron { display: inline-block; transition: transform .2s; }
    #tableToggle.open .chevron { transform: rotate(180deg); }
    #fileTableWrap { display: none; }
    #fileTableWrap.open {
      display: block;
      animation: fadeIn .18s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    #fileTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    #fileTable thead th {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #fileTable thead th:hover { color: var(--text); }
    #fileTable thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
    #fileTable thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
    #fileTable tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    #fileTable tbody tr:last-child td { border-bottom: none; }
    #fileTable tbody tr:hover td { background: var(--surface-hi); }
    .td-name {
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .td-dur {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--gold);
      white-space: nowrap;
      text-align: right;
    }
    .td-fail { color: var(--text-dim); font-style: italic; }
    .td-dur.fail { color: var(--text-dim); }

    /* ── History ──────────────────────────────────────────────────────────── */
    #historySection { }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    #historyList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hist-empty {
      font-size: 13px;
      color: var(--text-dim);
      font-style: italic;
      text-align: center;
      padding: 8px 0;
    }
    .hist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface-hi);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      transition: background var(--transition);
    }
    .hist-item:hover { background: var(--border); }
    .hist-info { flex: 1; min-width: 0; }
    .hist-folder {
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hist-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .hist-dur {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .hist-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    /* ── Toast ────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface-hi);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <img src="icon.svg" class="logo-img" alt="VRT">
      <div>
        <h1>Video Runtime Tracker</h1>
        <p class="tagline">Total runtime of any local video folder — no uploads, no server.</p>
      </div>
    </div>
    <button id="installBtn" hidden>📲 Install</button>
  </header>

  <!-- Drop zone -->
  <div id="dropZone">
    <div class="drop-icon">📂</div>
    <div class="drop-title">Drop a video folder here</div>
    <p class="drop-sub">or choose one below</p>
    <div class="btn-row">
      <button class="btn btn-primary" id="fsApiBtn">📁 Choose Folder</button>
      <label class="btn btn-ghost" for="legacyInput">🗂 Legacy Picker</label>
      <input type="file" id="legacyInput" webkitdirectory directory multiple accept="video/*">
    </div>
    <p class="fsapi-note" id="fsApiNote"></p>
  </div>

  <!-- Scan progress -->
  <section class="card" id="scanSection" hidden>
    <div class="scan-header">
      <span class="scan-folder" id="scanFolder">Scanning…</span>
      <button class="btn btn-danger" id="cancelBtn" style="padding:7px 14px;font-size:13px;">✕ Cancel</button>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="scan-meta">
      <span id="scanCount">0 / 0 files</span>
      <span class="scan-eta" id="scanEta"></span>
    </div>
    <div class="scan-file" id="scanFile"></div>
  </section>

  <!-- Results -->
  <section class="card" id="resultsSection" hidden>
    <div class="tc-wrap">
      <div class="tc-label">Total Runtime</div>
      <div class="tc-value" id="tcValue">00:00:00</div>
      <div class="tc-sub" id="tcSub"></div>
    </div>
    <div class="results-actions">
      <button class="btn btn-primary"  id="saveBtn">💾 Save to History</button>
      <button class="btn btn-ghost"    id="csvBtn">⬇ Export CSV</button>
      <button class="btn btn-ghost"    id="copyBtn">📋 Copy Summary</button>
      <button class="btn btn-ghost"    id="newScanBtn">🔄 New Scan</button>
    </div>
    <button id="tableToggle">
      <span class="chevron">▾</span>
      <span id="tableToggleLabel">Show file list</span>
    </button>
    <div id="fileTableWrap">
      <table id="fileTable">
        <thead>
          <tr>
            <th data-col="name">Filename</th>
            <th data-col="duration" style="text-align:right;">Duration</th>
          </tr>
        </thead>
        <tbody id="fileTableBody"></tbody>
      </table>
    </div>
  </section>

  <!-- History -->
  <section class="card" id="historySection">
    <div class="history-header">
      <span class="card-title" style="margin:0;">Scan History</span>
      <button class="btn btn-ghost" id="clearAllBtn" style="padding:6px 12px;font-size:12px;">Clear All</button>
    </div>
    <div id="historyList"><p class="hist-empty">No scans saved yet.</p></div>
  </section>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   VRT — Video Runtime Tracker
   ═══════════════════════════════════════════════════════════════════════════ */

// ── Constants ──────────────────────────────────────────────────────────────

const CONCURRENCY = 16;    // parallel video reads
const VIDEO_MIME = 'video/';

// ── State ──────────────────────────────────────────────────────────────────

const S = {
  scanning:        false,
  ac:              null,       // AbortController
  currentHandle:   null,       // FileSystemDirectoryHandle (current scan)
  results:         null,       // last completed scan result object
  sortCol:         'name',
  sortDir:         'asc',
  tableOpen:       false,
  pendingHandleCb: null,       // resolves when worker returns 'handle' msg
};

// ── Worker ─────────────────────────────────────────────────────────────────

const worker = new Worker('./worker.js');

worker.onmessage = ({ data }) => {
  switch (data.type) {
    case 'history':
      renderHistory(data.scans);
      break;
    case 'handle':
      if (S.pendingHandleCb) { S.pendingHandleCb(data.handle); S.pendingHandleCb = null; }
      break;
    case 'error':
      toast('Worker error: ' + data.message, 'error');
      break;
  }
};

worker.postMessage({ type: 'load' });

// ── Service Worker ─────────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── PWA install ────────────────────────────────────────────────────────────

let installPrompt = null;
const installBtn  = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installPrompt = e;
  installBtn.hidden = false;
});

installBtn.addEventListener('click', async () => {
  if (!installPrompt) return;
  await installPrompt.prompt();
  installPrompt = null;
  installBtn.hidden = true;
});

// ── File System Access API detection ──────────────────────────────────────

const hasFSAPI  = 'showDirectoryPicker' in window;
const fsApiNote = document.getElementById('fsApiNote');
const fsApiBtn  = document.getElementById('fsApiBtn');

if (!hasFSAPI) {
  fsApiBtn.textContent = '📁 Choose Folder';
  fsApiNote.textContent = 'Tip: Chrome/Edge support drag-and-drop re-scanning via the File System API.';
} else {
  fsApiNote.textContent = 'Re-scan any saved folder in one click with the File System API.';
}

// ── Drop zone ──────────────────────────────────────────────────────────────

const dropZone = document.getElementById('dropZone');

['dragenter', 'dragover'].forEach(evt =>
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag-active'); })
);
['dragleave', 'dragend', 'drop'].forEach(evt =>
  dropZone.addEventListener(evt, () => dropZone.classList.remove('drag-active'))
);

dropZone.addEventListener('drop', async e => {
  e.preventDefault();
  if (S.scanning) return;
  const items = [...e.dataTransfer.items];

  // Try File System Access API first (Chrome/Edge 86+)
  if (hasFSAPI && items[0]?.getAsFileSystemHandle) {
    try {
      const handle = await items[0].getAsFileSystemHandle();
      if (handle.kind === 'directory') {
        await launchScanFromHandle(handle);
        return;
      }
    } catch (_) { /* fall through */ }
  }

  // Fallback: webkitGetAsEntry
  const entry = items[0]?.webkitGetAsEntry?.();
  if (entry?.isDirectory) {
    const files = await readEntryRecursive(entry);
    await launchScanFromFiles(files, null);
  } else {
    toast('Please drop a folder, not individual files.', 'error');
  }
});

// ── FSAPI button ───────────────────────────────────────────────────────────

fsApiBtn.addEventListener('click', async () => {
  if (S.scanning) return;
  if (!hasFSAPI) { document.getElementById('legacyInput').click(); return; }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'read' });
    await launchScanFromHandle(handle);
  } catch (e) {
    if (e.name !== 'AbortError') toast('Could not open folder.', 'error');
  }
});

// ── Legacy file input ──────────────────────────────────────────────────────

document.getElementById('legacyInput').addEventListener('change', async e => {
  if (S.scanning) return;
  const all   = Array.from(e.target.files);
  const files = all.filter(f => f.type.startsWith(VIDEO_MIME));
  if (!files.length) { toast('No video files found.', 'error'); return; }
  await launchScanFromFiles(files, null);
  e.target.value = '';
});

// ── Collect files from FSAPI handle ───────────────────────────────────────

async function collectFromHandle(dirHandle) {
  const files = [];
  for await (const [, entry] of dirHandle.entries()) {
    if (entry.kind === 'file') {
      const f = await entry.getFile();
      if (f.type.startsWith(VIDEO_MIME)) files.push(f);
    } else if (entry.kind === 'directory') {
      files.push(...await collectFromHandle(entry)); // recurse
    }
  }
  return files;
}

// Collect from webkitGetAsEntry (drag-drop fallback)
// BUG FIXES: (1) readEntries() returns max 100 per call — must loop until empty batch
//            (2) added error callbacks so a bad entry never hangs the Promise
function readEntryRecursive(entry) {
  return new Promise(resolve => {
    if (entry.isFile) {
      entry.file(
        f  => resolve(f.type.startsWith(VIDEO_MIME) ? [f] : []),
        () => resolve([])   // file access error — skip silently
      );
    } else if (entry.isDirectory) {
      const reader  = entry.createReader();
      const all     = [];
      const readBatch = () => {
        reader.readEntries(async batch => {
          if (!batch.length) {
            // All batches consumed — recurse into each entry
            const results = [];
            for (const e of all) results.push(...await readEntryRecursive(e));
            resolve(results);
          } else {
            all.push(...batch);
            readBatch(); // fetch next batch (may be another 100)
          }
        }, () => resolve([])); // readEntries error — resolve empty
      };
      readBatch();
    } else {
      resolve([]);
    }
  });
}

// ── Scan launchers ─────────────────────────────────────────────────────────

async function launchScanFromHandle(dirHandle) {
  const files = await collectFromHandle(dirHandle);
  if (!files.length) { toast('No video files found in that folder.', 'error'); return; }
  S.currentHandle = dirHandle;
  await launchScanFromFiles(files, dirHandle.name);
}

async function launchScanFromFiles(files, overrideName) {
  if (!files.length) return;
  // BUG FIX: if not coming from FSAPI (overrideName is null), clear any stale
  // handle left over from a previous scan so hasHandle is never set incorrectly.
  if (overrideName === null) S.currentHandle = null;
  const folderName = overrideName
    ?? (files[0].webkitRelativePath?.split('/')?.[0] || 'Unknown Folder');

  await startScan(files, folderName);
}

// ── Core: start scan ───────────────────────────────────────────────────────

async function startScan(files, folderName) {
  if (S.scanning) return;
  S.scanning = true;
  S.results  = null;

  // Reset results UI
  el('resultsSection').hidden = true;
  el('scanSection').hidden    = false;
  el('scanFolder').textContent = folderName;
  el('progressFill').style.width = '0%';
  el('progressFill').classList.remove('done');
  el('scanEta').textContent  = '';
  el('scanCount').textContent = `0 / ${files.length} files`;
  el('scanFile').textContent  = '';
  window.scrollTo({ top: el('scanSection').offsetTop - 20, behavior: 'smooth' });

  S.ac = new AbortController();
  const { signal } = S.ac;
  const startTime  = Date.now();
  let   processed  = 0;
  let   failed     = 0;
  const fileResults = [];

  try {
    // Pool-based concurrency: always keeps CONCURRENCY slots in flight.
    // Unlike chunking, a slow file never stalls idle slots waiting on the next chunk.
    let nextIdx = 0;

    const runSlot = async () => {
      while (nextIdx < files.length) {
        if (signal.aborted) throw new DOMException('Cancelled', 'AbortError');
        const file = files[nextIdx++]; // JS is single-threaded: no race on nextIdx

        const { duration, success } = await getVideoDuration(file);
        if (signal.aborted) return;   // discard result if cancelled mid-flight

        if (!success) failed++;
        fileResults.push({ name: file.name, duration, success });

        processed++;
        const elapsed = (Date.now() - startTime) / 1000;
        const rate    = processed / elapsed;
        const eta     = Math.round((files.length - processed) / rate);
        const pct     = Math.round((processed / files.length) * 100);

        el('scanFile').textContent     = processed < files.length ? file.name : '';
        el('progressFill').style.width = pct + '%';
        el('scanCount').textContent    = `${processed} / ${files.length} files`;
        el('scanEta').textContent      = processed < files.length
          ? `ETA: ${formatEta(eta)}` : '';
      }
    };

    await Promise.all(Array.from({ length: Math.min(CONCURRENCY, files.length) }, runSlot));

    if (signal.aborted) return;

    const totalDuration = fileResults.reduce((s, r) => s + (r.success ? r.duration : 0), 0);

    S.results = {
      id:            'scan_' + Date.now(),
      folderName,
      timestamp:     Date.now(),
      totalDuration,
      fileCount:     files.length,
      failedCount:   failed,
      hasHandle:     !!S.currentHandle,
      files:         fileResults,
    };

    el('progressFill').classList.add('done');
    el('progressFill').style.width = '100%';
    el('scanFile').textContent = '';
    el('scanEta').textContent  = '✅ Complete';

    setTimeout(showResults, 500);

  } catch (e) {
    if (e.name === 'AbortError') {
      toast('Scan cancelled.', 'error');
      el('scanSection').hidden = true;
    } else {
      toast('Scan error: ' + e.message, 'error');
    }
  } finally {
    S.scanning       = false;
    S.ac             = null;
  }
}

// ── Per-file duration ──────────────────────────────────────────────────────

function getVideoDuration(file) {
  return new Promise(resolve => {
    const url   = URL.createObjectURL(file);
    const video = document.createElement('video');
    video.preload = 'metadata';

    const done = (duration, success) => {
      URL.revokeObjectURL(url);
      video.src = '';
      resolve({ duration, success });
    };

    video.onloadedmetadata = () => {
      const d = isFinite(video.duration) && video.duration > 0 ? video.duration : 0;
      done(d, d > 0);
    };
    video.onerror = () => done(0, false);

    video.src = url;
    video.load();
  });
}

// ── Cancel ─────────────────────────────────────────────────────────────────

el('cancelBtn').addEventListener('click', () => {
  if (S.ac) S.ac.abort();
});

// ── Show results ───────────────────────────────────────────────────────────

function showResults() {
  const r = S.results;
  if (!r) return;

  el('tcValue').textContent = formatTC(r.totalDuration);
  el('tcSub').textContent   =
    `${r.folderName} · ${r.fileCount} file${r.fileCount !== 1 ? 's' : ''}` +
    (r.failedCount ? ` · ${r.failedCount} skipped` : '');

  el('scanSection').hidden    = true;
  el('resultsSection').hidden = false;

  // BUG FIX: reset Save button — it stays disabled after being clicked on a
  // previous scan, which makes it permanently broken for subsequent scans.
  el('saveBtn').textContent = '💾 Save to History';
  el('saveBtn').disabled    = false;

  // Reset sort & table
  S.sortCol   = 'name';
  S.sortDir   = 'asc';
  S.tableOpen = false;
  el('tableToggle').classList.remove('open');
  el('fileTableWrap').classList.remove('open');
  el('tableToggleLabel').textContent = `Show file list (${r.fileCount} files)`;
  updateTableHeaders();
  renderFileTable();

  window.scrollTo({ top: el('resultsSection').offsetTop - 20, behavior: 'smooth' });
}

// ── File table ─────────────────────────────────────────────────────────────

function renderFileTable() {
  const r = S.results;
  if (!r) return;
  const sorted = [...r.files].sort((a, b) => {
    const m = S.sortDir === 'asc' ? 1 : -1;
    if (S.sortCol === 'name') return m * a.name.localeCompare(b.name);
    return m * (a.duration - b.duration);
  });

  const tbody = el('fileTableBody');
  tbody.innerHTML = '';
  sorted.forEach(({ name, duration, success }) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-name ${success ? '' : 'td-fail'}" title="${esc(name)}">${esc(name)}</td>
      <td class="td-dur ${success ? '' : 'fail'}">${success ? formatTC(duration) : '—'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function updateTableHeaders() {
  document.querySelectorAll('#fileTable thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === S.sortCol)
      th.classList.add('sort-' + S.sortDir);
  });
}

document.querySelectorAll('#fileTable thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (S.sortCol === col) S.sortDir = S.sortDir === 'asc' ? 'desc' : 'asc';
    else { S.sortCol = col; S.sortDir = 'asc'; }
    updateTableHeaders();
    renderFileTable();
  });
});

el('tableToggle').addEventListener('click', () => {
  S.tableOpen = !S.tableOpen;
  el('tableToggle').classList.toggle('open', S.tableOpen);
  el('fileTableWrap').classList.toggle('open', S.tableOpen);
});

// ── Results actions ────────────────────────────────────────────────────────

el('saveBtn').addEventListener('click', () => {
  const r = S.results;
  if (!r) return;
  worker.postMessage({ type: 'save', scan: r });
  if (r.hasHandle && S.currentHandle) {
    worker.postMessage({ type: 'saveHandle', scanId: r.id, handle: S.currentHandle });
  }
  el('saveBtn').textContent  = '✅ Saved!';
  el('saveBtn').disabled     = true;
  toast('Scan saved to history.', 'success');
});

el('csvBtn').addEventListener('click', () => {
  const r = S.results;
  if (!r) return;
  const rows = [['Filename', 'Duration (s)', 'Duration (H:MM:SS)', 'Status']];
  r.files.forEach(f => rows.push([
    `"${f.name.replace(/"/g, '""')}"`,
    f.success ? f.duration.toFixed(3) : '',
    f.success ? formatTC(f.duration) : '',
    f.success ? 'ok' : 'failed',
  ]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = Object.assign(document.createElement('a'), {
    href:     'data:text/csv;charset=utf-8,' + encodeURIComponent(csv),
    download: `${r.folderName}_runtime.csv`,
  });
  a.click();
  toast('CSV downloaded.', 'success');
});

el('copyBtn').addEventListener('click', async () => {
  const r = S.results;
  if (!r) return;
  const text = `Video Runtime Tracker\n📁 ${r.folderName}\n⏱ ${formatTC(r.totalDuration)}  (${formatHMS(r.totalDuration)})\n📄 ${r.fileCount} files${r.failedCount ? `, ${r.failedCount} skipped` : ''}\n🕐 Scanned ${new Date(r.timestamp).toLocaleString()}`;
  try {
    await navigator.clipboard.writeText(text);
    toast('Copied to clipboard!', 'success');
  } catch {
    toast('Copy failed — try a different browser.', 'error');
  }
});

el('newScanBtn').addEventListener('click', () => {
  el('resultsSection').hidden = true;
  S.results        = null;
  S.currentHandle  = null;
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ── History ────────────────────────────────────────────────────────────────

function renderHistory(scans) {
  const list = el('historyList');
  list.innerHTML = '';

  if (!scans.length) {
    list.innerHTML = '<p class="hist-empty">No scans saved yet.</p>';
    return;
  }

  scans.forEach(s => {
    const date = new Date(s.timestamp).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
    const div  = document.createElement('div');
    div.className  = 'hist-item';
    div.dataset.id = s.id;
    div.innerHTML  = `
      <div class="hist-info">
        <div class="hist-folder">${esc(s.folderName)}</div>
        <div class="hist-meta">${s.fileCount} files · ${date}${s.failedCount ? ` · ${s.failedCount} skipped` : ''}</div>
      </div>
      <div class="hist-dur">${formatTC(s.totalDuration)}</div>
      <div class="hist-actions">
        ${s.hasHandle
          ? `<button class="btn-icon rescan" data-rescan="${s.id}" title="Re-scan this folder">🔄</button>`
          : ''}
        <button class="btn-icon" data-del="${s.id}" title="Delete">✕</button>
      </div>
    `;
    list.appendChild(div);
  });

  // Delete buttons
  list.querySelectorAll('[data-del]').forEach(btn =>
    btn.addEventListener('click', () => worker.postMessage({ type: 'delete', id: btn.dataset.del }))
  );

  // Re-scan buttons
  list.querySelectorAll('[data-rescan]').forEach(btn =>
    btn.addEventListener('click', () => rescanEntry(btn.dataset.rescan))
  );
}

el('clearAllBtn').addEventListener('click', () => {
  if (confirm('Clear all scan history? This cannot be undone.'))
    worker.postMessage({ type: 'clear' });
});

// ── Re-scan from saved handle ──────────────────────────────────────────────

async function rescanEntry(scanId) {
  if (S.scanning) { toast('A scan is already in progress.', 'error'); return; }

  const handle = await new Promise(resolve => {
    S.pendingHandleCb = resolve;
    worker.postMessage({ type: 'loadHandle', scanId });
  });

  if (!handle) { toast('No saved folder for this entry.', 'error'); return; }

  let perm = await handle.queryPermission({ mode: 'read' });
  if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'read' });
  if (perm !== 'granted') { toast('Folder access denied.', 'error'); return; }

  S.currentHandle = handle;
  const files = await collectFromHandle(handle);
  if (!files.length) { toast('No video files found.', 'error'); return; }
  await launchScanFromFiles(files, handle.name);
}

// ── Formatters ─────────────────────────────────────────────────────────────

function formatTC(secs) {
  // BUG FIX: pad hours to 2 digits — matches the "00:00:00" HTML placeholder
  // and prevents a jarring layout shift when hours flips from 9 to 10.
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatHMS(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return [h && `${h}h`, m && `${m}m`, `${s}s`].filter(Boolean).join(' ');
}

function formatEta(secs) {
  if (!isFinite(secs) || secs < 0) return '';
  if (secs < 60) return `${secs}s`;
  return `${Math.floor(secs/60)}m ${secs%60}s`;
}

// ── Utilities ──────────────────────────────────────────────────────────────

function el(id) { return document.getElementById(id); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastTimer = null;
function toast(msg, type = '') {
  const t = el('toast');
  t.textContent = msg;
  t.className   = 'show ' + type;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}
</script>

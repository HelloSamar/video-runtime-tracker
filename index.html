<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0e1016"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg" type="image/svg+xml"><title>VRT — Video Runtime Tracker</title><style>
:root{--bg:#0e1016;--card:#161b27;--hi:#1d2437;--bd:#28334a;--txt:#dde3f0;--dim:#7e8da8;--acc:#4b7bec;--gold:#f5c842;--green:#2ecc8a;--red:#f04b4b;--mono:ui-monospace,'Cascadia Code',monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--txt);padding:32px 16px 80px}#app{max-width:760px;margin:auto;display:flex;flex-direction:column;gap:18px}.card,#drop{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:22px}header{display:flex;align-items:center;justify-content:space-between;gap:12px}.logo{display:flex;align-items:center;gap:12px}.logo img{width:44px;height:44px}h1{font-size:20px}.dim{font-size:12px;color:var(--dim)}.badge{font:11px var(--mono);color:var(--green);border:1px solid rgba(46,204,138,.35);border-radius:99px;padding:5px 10px}#drop{text-align:center;border-style:dashed}.drop-active,#drop:hover{border-color:var(--acc);background:rgba(75,123,236,.12)}.icon{font-size:42px;margin-bottom:10px}.title{font-weight:700;margin-bottom:6px}.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}.btn{padding:9px 16px;border:0;border-radius:8px;font-weight:700;cursor:pointer;background:var(--hi);color:var(--txt);border:1px solid var(--bd)}.primary{background:var(--acc);color:white;border:0}.danger{background:rgba(240,75,75,.12);color:var(--red);border-color:rgba(240,75,75,.3)}#legacy{display:none}[hidden]{display:none!important}.scan-head{display:flex;justify-content:space-between;gap:10px;margin-bottom:12px}.bar{height:8px;background:var(--hi);border-radius:99px;overflow:hidden;margin-bottom:10px}.fill{height:100%;width:0;background:linear-gradient(90deg,#4b7bec,#6890f5);transition:width .2s}.fill.done{background:linear-gradient(90deg,var(--green),#5fedb0)}.meta{display:flex;justify-content:space-between;font-size:12px;color:var(--dim)}#scanFile{font:11px var(--mono);color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:16px;margin-top:8px}.tc{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.3);border-radius:12px;text-align:center;padding:22px;margin-bottom:12px}.tcv{font:700 clamp(36px,10vw,60px) var(--mono);color:var(--gold);letter-spacing:3px}.warn{padding:10px 12px;border-radius:8px;background:rgba(240,75,75,.12);color:var(--red);font-size:13px;margin:10px 0}.ok{padding:10px 12px;border-radius:8px;background:rgba(46,204,138,.08);color:var(--green);font-size:13px;margin:10px 0}table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}td,th{border-bottom:1px solid var(--bd);padding:8px;text-align:left}th{font-size:11px;color:var(--dim);text-transform:uppercase}.dur{text-align:right;font-family:var(--mono);color:var(--gold)}.fail{color:var(--red)}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--hi);border:1px solid var(--bd);border-radius:99px;padding:10px 18px;opacity:0;transition:.2s}.show{opacity:1!important}
</style></head><body><div id="app"><header><div class="logo"><img src="icon.svg" alt="VRT"><div><h1>Video Runtime Tracker</h1><p class="dim">Fast local runtime scan — no uploads.</p></div></div><span class="badge">v8 fast</span></header><div id="drop"><div class="icon">📂</div><div class="title">Drop a video folder here</div><p class="dim">or choose one below</p><div class="row"><button class="btn primary" id="choose">📁 Choose Folder</button><label class="btn" for="legacy">🗂 Legacy Picker</label><input type="file" id="legacy" webkitdirectory directory multiple></div><p class="dim" id="note" style="margin-top:10px"></p></div><section class="card" id="scan" hidden><div class="scan-head"><b id="folder">Scanning…</b><button class="btn danger" id="cancel">✕ Cancel</button></div><div class="bar"><div class="fill" id="fill"></div></div><div class="meta"><span id="count">0 / 0 videos</span><span id="eta"></span></div><div id="scanFile"></div></section><section class="card" id="results" hidden><div class="tc"><div class="dim">Total Runtime</div><div class="tcv" id="total">00:00:00</div><div class="dim" id="sub"></div></div><div id="notice"></div><div class="row"><button class="btn primary" id="save">💾 Save</button><button class="btn" id="csv">⬇ Export CSV</button><button class="btn" id="copy">📋 Copy</button><button class="btn" id="new">🔄 New Scan</button></div><table><thead><tr><th>Filename</th><th class="dur">Duration</th><th>Status</th></tr></thead><tbody id="tbody"></tbody></table></section><section class="card"><div style="display:flex;justify-content:space-between;align-items:center"><b class="dim">SCAN HISTORY</b><button class="btn" id="clear" style="padding:6px 10px;font-size:12px">Clear</button></div><div id="hist"></div></section></div><div id="toast"></div><script src="./vrt-hotfix.js?v=v8-fast"></script><script>
const BUILD='vrt-direct-v8-fast',TOTAL_CONCURRENCY=8,FALLBACK_TIMEOUT_MS=3000;
const V=new Set('3g2,3gp,asf,avi,divx,dv,f4v,flv,m2ts,m4v,m4b,m4p,mkv,mod,mov,mp4,mpe,mpeg,mpg,mts,mxf,ogm,ogv,rm,rmvb,tod,ts,vob,webm,wm,wmv'.split(','));
const D=new Set('pdf,txt,rtf,doc,docx,odt,pages,xls,xlsx,ods,csv,ppt,pptx,odp,key,json,xml,html,htm,md,zip,rar,7z'.split(','));
const S={scanning:false,cancelled:false,results:null};const $=id=>document.getElementById(id);const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
cleanup();$('note').textContent=window.showDirectoryPicker?'Fast mode: unreadable files time out after ~3 seconds.':'Use Legacy Picker in this browser.';renderHistory();
async function cleanup(){try{if('caches'in window){let k=await caches.keys();await Promise.all(k.filter(x=>x.startsWith('vrt-')).map(x=>caches.delete(x)))}}catch{}try{if('serviceWorker'in navigator){let r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()))}}catch{}}
function ext(f){let n=(f?.name||'').toLowerCase(),d=n.lastIndexOf('.');return d<0||d===n.length-1?'':n.slice(d+1)}function path(f){return f.webkitRelativePath||f.relativePath||f.name||'unknown'}
function localShould(f){let e=ext(f),m=(f.type||'').toLowerCase();if(m.startsWith('video/')||V.has(e))return true;if(m==='application/pdf'||D.has(e))return false;return!m||m==='application/octet-stream'||m.startsWith('application/')}function should(f){return typeof window.shouldAttemptDuration==='function'?window.shouldAttemptDuration(f):localShould(f)}
async function readDur(f){try{if(typeof window.getVideoDuration==='function'){let r=await window.getVideoDuration(f);return r&&isFinite(r.duration)&&r.duration>0?{duration:r.duration,success:true,mode:r.mode||'ok'}:{duration:0,success:false,mode:r?.mode||'failed'}}}catch{}return elementDur(f)}
function elementDur(f){return new Promise(res=>{let u=URL.createObjectURL(f),v=document.createElement('video'),done=false;v.preload='metadata';v.muted=true;v.playsInline=true;let finish=(d,ok)=>{if(done)return;done=true;clearTimeout(t);v.onloadedmetadata=v.ondurationchange=v.onerror=null;v.removeAttribute('src');try{v.load()}catch{}URL.revokeObjectURL(u);res({duration:d,success:ok,mode:ok?'browser':'timeout'})};let read=()=>{let d=isFinite(v.duration)&&v.duration>0?v.duration:0;if(d>0)finish(d,true)};let t=setTimeout(()=>finish(0,false),FALLBACK_TIMEOUT_MS);v.onloadedmetadata=read;v.ondurationchange=read;v.onerror=()=>finish(0,false);v.src=u;v.load()})}
async function collect(h,disc){let files=[];for await(const[,e]of h.entries()){try{if(e.kind==='file'){let f=await e.getFile();disc.totalFiles++;should(f)?files.push(f):disc.ignoredFiles++}else if(e.kind==='directory')files.push(...await collect(e,disc))}catch{disc.ignoredFiles++}}return files}
function readEntry(e,disc){return new Promise(resolve=>{if(!e)return resolve([]);if(e.isFile){e.file(f=>{disc.totalFiles++;should(f)?resolve([f]):(disc.ignoredFiles++,resolve([]))},()=>{disc.ignoredFiles++;resolve([])});return}if(!e.isDirectory)return resolve([]);let r=e.createReader(),all=[];let loop=()=>r.readEntries(async b=>{if(!b.length){let out=[];for(const c of all)out.push(...await readEntry(c,disc));resolve(out)}else{all.push(...b);loop()}},()=>resolve([]));loop()})}
$('choose').onclick=async()=>{if(S.scanning)return;if(!window.showDirectoryPicker){$('legacy').click();return}try{let h=await showDirectoryPicker({mode:'read'}),d={totalFiles:0,ignoredFiles:0},f=await collect(h,d);await start(f,h.name||'Selected Folder',d)}catch(e){if(e.name!=='AbortError')toast('Could not open folder.')}};
$('legacy').onchange=async e=>{if(S.scanning)return;let all=[...(e.target.files||[])],f=all.filter(should),name=f[0]?.webkitRelativePath?.split('/')?.[0]||all[0]?.webkitRelativePath?.split('/')?.[0]||'Selected Folder';await start(f,name,{totalFiles:all.length,ignoredFiles:all.length-f.length});e.target.value=''};
let drop=$('drop');['dragenter','dragover'].forEach(t=>drop.addEventListener(t,e=>{e.preventDefault();drop.classList.add('drop-active')}));['dragleave','dragend','drop'].forEach(t=>drop.addEventListener(t,()=>drop.classList.remove('drop-active')));drop.ondrop=async e=>{e.preventDefault();if(S.scanning)return;let items=[...(e.dataTransfer.items||[])],d={totalFiles:0,ignoredFiles:0};try{if(items[0]?.getAsFileSystemHandle){let h=await items[0].getAsFileSystemHandle();if(h.kind==='directory'){await start(await collect(h,d),h.name||'Dropped Folder',d);return}}let ent=items[0]?.webkitGetAsEntry?.();if(ent?.isDirectory)await start(await readEntry(ent,d),ent.name||'Dropped Folder',d);else toast('Please drop a folder.')}catch{toast('Could not read dropped folder.')}};
$('cancel').onclick=()=>S.cancelled=true;$('new').onclick=()=>{$('results').hidden=true;S.results=null;scrollTo({top:0,behavior:'smooth'})};$('save').onclick=()=>{if(!S.results)return;let h=history();h.unshift(S.results);localStorage.setItem('vrt-history-v8',JSON.stringify(h.slice(0,20)));renderHistory();toast('Saved.')};$('clear').onclick=()=>{localStorage.removeItem('vrt-history-v8');renderHistory()};$('csv').onclick=exportCSV;$('copy').onclick=copySummary;
async function start(files,name,disc){if(!files.length){toast('No videos found.');return}S.scanning=true;S.cancelled=false;S.results=null;$('results').hidden=true;$('scan').hidden=false;$('folder').textContent=name;$('fill').style.width='0%';$('fill').classList.remove('done');$('eta').textContent='';$('count').textContent=`0 / ${files.length} videos`;$('scanFile').textContent=`Found ${disc.totalFiles} files · scanning ${files.length} · ignored ${disc.ignoredFiles} · fast timeout ${FALLBACK_TIMEOUT_MS/1000}s`;scrollTo({top:$('scan').offsetTop-20,behavior:'smooth'});let started=Date.now(),next=0,processed=0,out=[];async function slot(){while(!S.cancelled&&next<files.length){let f=files[next++];$('scanFile').textContent=path(f);let r=await readDur(f);out.push({name:path(f),duration:r.success?r.duration:0,success:!!r.success,ext:ext(f),size:f.size||0,mode:r.mode||''});processed++;let elapsed=Math.max(.001,(Date.now()-started)/1000),eta=Math.round((files.length-processed)/(processed/elapsed));$('fill').style.width=Math.round(processed/files.length*100)+'%';$('count').textContent=`${processed} / ${files.length} videos`;$('eta').textContent=processed<files.length?`ETA: ${fmtEta(eta)}`:`Elapsed: ${fmtEta(Math.round(elapsed))}`}}await Promise.all(Array.from({length:Math.min(TOTAL_CONCURRENCY,files.length)},slot));S.scanning=false;if(S.cancelled){$('scan').hidden=true;toast('Scan cancelled.');return}let elapsedSec=Math.round((Date.now()-started)/1000),total=out.reduce((s,r)=>s+(r.success?r.duration:0),0),failed=out.filter(r=>!r.success).length;S.results={id:'scan_'+Date.now(),folderName:name,timestamp:Date.now(),totalDuration:total,fileCount:files.length,failedCount:failed,discovery:disc,elapsedSec,build:BUILD,files:out};$('fill').classList.add('done');$('eta').textContent=`Complete in ${fmtEta(elapsedSec)}`;$('scanFile').textContent='';show()}
function show(){let r=S.results;$('scan').hidden=true;$('results').hidden=false;$('total').textContent=fmtTC(r.totalDuration);$('sub').textContent=`${r.folderName} · ${r.fileCount} videos/candidates · found ${r.discovery.totalFiles} files, ignored ${r.discovery.ignoredFiles}${r.failedCount?' · '+r.failedCount+' failed':''} · scanned in ${fmtEta(r.elapsedSec)}`;$('notice').innerHTML=r.failedCount?`<div class="warn">${r.failedCount} file(s) could not be read quickly. Fast mode skips long waits; export CSV for exact files.</div>`:'<div class="ok">Fast scan completed without failures.</div>';$('tbody').innerHTML=[...r.files].sort((a,b)=>a.name.localeCompare(b.name)).map(f=>`<tr><td title="${esc(f.name)}">${esc(f.name)}</td><td class="dur ${f.success?'':'fail'}">${f.success?fmtTC(f.duration):'—'}</td><td class="${f.success?'':'fail'}">${f.success?'ok':'failed'}${f.ext?' · .'+esc(f.ext):''}${f.mode?' · '+esc(f.mode):''}</td></tr>`).join('')}
function history(){try{return JSON.parse(localStorage.getItem('vrt-history-v8')||'[]')}catch{return[]}}function renderHistory(){let h=history();$('hist').innerHTML=h.length?h.map(s=>`<div style="display:flex;justify-content:space-between;gap:10px;margin-top:8px"><div><b>${esc(s.folderName)}</b><p class="dim">${s.fileCount} videos · ${new Date(s.timestamp).toLocaleString()}${s.failedCount?' · '+s.failedCount+' failed':''}${s.elapsedSec?' · '+fmtEta(s.elapsedSec):''}</p></div><b class="dur">${fmtTC(s.totalDuration)}</b></div>`).join(''):'<p class="dim" style="margin-top:8px">No scans saved yet.</p>'}
function exportCSV(){let r=S.results;if(!r)return;let rows=[['Filename','Extension','Size bytes','Duration seconds','Duration H:MM:SS','Status','Mode','Build','Scan elapsed seconds']];r.files.forEach(f=>rows.push([f.name,f.ext,f.size,f.success?f.duration.toFixed(3):'',f.success?fmtTC(f.duration):'',f.success?'ok':'failed',f.mode||'',r.build,r.elapsedSec]));let csv=rows.map(row=>row.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=`${r.folderName}_runtime.csv`;a.click()}
async function copySummary(){let r=S.results;if(!r)return;let text=`Video Runtime Tracker\nFolder: ${r.folderName}\nRuntime: ${fmtTC(r.totalDuration)} (${fmtHMS(r.totalDuration)})\nFiles: ${r.fileCount}\nFailed: ${r.failedCount}\nScan time: ${fmtEta(r.elapsedSec)}\nBuild: ${BUILD}`;try{await navigator.clipboard.writeText(text);toast('Copied.')}catch{toast('Copy failed.')}}
function fmtTC(x){let h=Math.floor(x/3600),m=Math.floor(x%3600/60),s=Math.floor(x%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}function fmtHMS(x){let h=Math.floor(x/3600),m=Math.floor(x%3600/60),s=Math.floor(x%60);return[h&&h+'h',m&&m+'m',s+'s'].filter(Boolean).join(' ')}function fmtEta(s){if(!isFinite(s)||s<0)return'';return s<60?s+'s':Math.floor(s/60)+'m '+s%60+'s'}let tt=null;function toast(m){$('toast').textContent=m;$('toast').className='show';clearTimeout(tt);tt=setTimeout(()=>$('toast').className='',3000)}
</script></body></html>

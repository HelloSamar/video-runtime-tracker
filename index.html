<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0e1016">
  <meta name="description" content="Calculate the total runtime of any local video folder — 100% in-browser, no uploads, no server.">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>VRT — Video Runtime Tracker</title>
  <style>
    :root{--bg:#0e1016;--surface:#161b27;--surface-hi:#1d2437;--border:#28334a;--text:#dde3f0;--text-dim:#7e8da8;--accent:#4b7bec;--accent-h:#6890f5;--gold:#f5c842;--green:#2ecc8a;--red:#f04b4b;--red-bg:rgba(240,75,75,.12);--mono:ui-monospace,'Cascadia Code','Fira Code',monospace;--sans:system-ui,-apple-system,'Segoe UI',sans-serif;--r:12px;--r-sm:8px}
    @media (prefers-color-scheme:light){:root{--bg:#eef1f7;--surface:#fff;--surface-hi:#f4f7ff;--border:#d0d8eb;--text:#1c2340;--text-dim:#6f7f99;--accent:#3a66d9;--accent-h:#2a54c4;--gold:#9a6d04;--green:#1a9a63;--red:#d63030;--red-bg:rgba(214,48,48,.08)}}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:32px 16px 80px}#app{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:20px}header{display:flex;align-items:center;justify-content:space-between;gap:14px}.logo{display:flex;align-items:center;gap:14px}.logo-img{width:44px;height:44px}h1{font-size:20px;line-height:1.2}.tagline,.muted{font-size:12px;color:var(--text-dim)}.badge{font:11px var(--mono);color:var(--green);border:1px solid rgba(46,204,138,.35);border-radius:99px;padding:5px 10px;white-space:nowrap}.card,#dropZone{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}#dropZone{text-align:center;border-style:dashed;transition:.18s}.drop-active,#dropZone:hover{border-color:var(--accent);background:rgba(75,123,236,.12)}.drop-icon{font-size:44px;margin-bottom:12px}.drop-title{font-size:16px;font-weight:700;margin-bottom:6px}.drop-sub{font-size:13px;color:var(--text-dim);margin-bottom:20px}.btn-row,.results-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r-sm);border:0;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}.btn:disabled{opacity:.5;cursor:not-allowed}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover:not(:disabled){background:var(--accent-h)}.btn-ghost{background:var(--surface-hi);color:var(--text);border:1px solid var(--border)}.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(240,75,75,.25)}#legacyInput{display:none}#scanSection[hidden],#resultsSection[hidden]{display:none}.scan-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}.scan-folder{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.progress-track{height:8px;background:var(--surface-hi);border-radius:99px;overflow:hidden;margin-bottom:10px}.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#4b7bec,#6890f5);border-radius:99px;transition:width .25s}.progress-fill.done{background:linear-gradient(90deg,var(--green),#5fedb0)}.scan-meta{display:flex;justify-content:space-between;gap:12px;font-size:12px;color:var(--text-dim)}.scan-file{font:11px var(--mono);color:var(--text-dim);margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:16px}.tc-wrap{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.3);border-radius:var(--r);padding:24px;text-align:center;margin-bottom:16px}.tc-label{font:10px var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}.tc-value{font:700 clamp(40px,10vw,64px) var(--mono);color:var(--gold);letter-spacing:4px;line-height:1}.tc-sub{font-size:13px;color:var(--text-dim);margin-top:10px}.warn{margin:12px 0;padding:10px 12px;border-radius:var(--r-sm);background:var(--red-bg);color:var(--red);font-size:13px}table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left}th{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim)}td.dur{text-align:right;font-family:var(--mono);color:var(--gold);white-space:nowrap}td.fail{color:var(--red)}.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.hist-item{display:flex;align-items:center;gap:10px;justify-content:space-between;background:var(--surface-hi);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;margin-top:8px}.hist-title{font-size:14px;font-weight:700}.hist-meta{font-size:11px;color:var(--text-dim);margin-top:2px}.hist-dur{font:700 13px var(--mono);color:var(--gold);white-space:nowrap}#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface-hi);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 20px;border-radius:99px;opacity:0;pointer-events:none;transition:.2s;z-index:20}#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <img src="icon.svg" class="logo-img" alt="VRT">
      <div><h1>Video Runtime Tracker</h1><p class="tagline">Total runtime of a local video folder — no uploads, no server.</p></div>
    </div>
    <span class="badge" id="buildBadge">v7 direct</span>
  </header>

  <div id="dropZone">
    <div class="drop-icon">📂</div>
    <div class="drop-title">Drop a video folder here</div>
    <p class="drop-sub">or choose one below</p>
    <div class="btn-row">
      <button class="btn btn-primary" id="fsApiBtn">📁 Choose Folder</button>
      <label class="btn btn-ghost" for="legacyInput">🗂 Legacy Picker</label>
      <input type="file" id="legacyInput" webkitdirectory directory multiple>
    </div>
    <p class="muted" id="fsApiNote" style="margin-top:10px"></p>
  </div>

  <section class="card" id="scanSection" hidden>
    <div class="scan-header"><span class="scan-folder" id="scanFolder">Scanning…</span><button class="btn btn-danger" id="cancelBtn">✕ Cancel</button></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="scan-meta"><span id="scanCount">0 / 0 videos</span><span id="scanEta"></span></div>
    <div class="scan-file" id="scanFile"></div>
  </section>

  <section class="card" id="resultsSection" hidden>
    <div class="tc-wrap"><div class="tc-label">Total Runtime</div><div class="tc-value" id="tcValue">00:00:00</div><div class="tc-sub" id="tcSub"></div></div>
    <div id="failNotice"></div>
    <div class="results-actions"><button class="btn btn-primary" id="saveBtn">💾 Save</button><button class="btn btn-ghost" id="csvBtn">⬇ Export CSV</button><button class="btn btn-ghost" id="copyBtn">📋 Copy Summary</button><button class="btn btn-ghost" id="newScanBtn">🔄 New Scan</button></div>
    <table><thead><tr><th>Filename</th><th style="text-align:right">Duration</th><th>Status</th></tr></thead><tbody id="fileTableBody"></tbody></table>
  </section>

  <section class="card"><div class="history-header"><span class="muted" style="font-weight:700;letter-spacing:.12em;text-transform:uppercase">Scan History</span><button class="btn btn-ghost" id="clearAllBtn" style="padding:6px 12px;font-size:12px">Clear All</button></div><div id="historyList"></div></section>
</div>
<div id="toast"></div>
<script src="./vrt-hotfix.js?v=v7-direct"></script>
<script>
const BUILD = 'vrt-direct-v7';
const TOTAL_CONCURRENCY = 4;
const VIDEO_EXTS = new Set(['3g2','3gp','asf','avi','divx','dv','f4v','flv','m2ts','m4v','m4b','m4p','mkv','mod','mov','mp4','mpe','mpeg','mpg','mts','mxf','ogm','ogv','rm','rmvb','tod','ts','vob','webm','wm','wmv']);
const DOC_EXTS = new Set(['pdf','txt','rtf','doc','docx','odt','pages','xls','xlsx','ods','csv','ppt','pptx','odp','key','json','xml','html','htm','md','zip','rar','7z']);
const S = { scanning:false, cancelled:false, results:null, discovery:null };
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

cleanupOldPWA();
$('fsApiNote').textContent = window.showDirectoryPicker ? 'Chrome/Edge: use Choose Folder for best results.' : 'Your browser does not support the modern folder picker. Use Legacy Picker.';
renderHistory();

async function cleanupOldPWA(){
  try { if ('caches' in window) { const keys = await caches.keys(); await Promise.all(keys.filter(k => k.startsWith('vrt-')).map(k => caches.delete(k))); } } catch (_) {}
  try { if ('serviceWorker' in navigator) { const regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r => r.unregister())); } } catch (_) {}
}

function fileExt(file){ const n=(file && file.name || '').toLowerCase(); const d=n.lastIndexOf('.'); return d<0 || d===n.length-1 ? '' : n.slice(d+1); }
function pathOf(file){ return file.webkitRelativePath || file.relativePath || file.name || 'unknown'; }
function localShouldAttempt(file){ const ext=fileExt(file); const mime=(file.type || '').toLowerCase(); if (mime.startsWith('video/') || VIDEO_EXTS.has(ext)) return true; if (mime === 'application/pdf' || DOC_EXTS.has(ext)) return false; return !mime || mime === 'application/octet-stream' || mime.startsWith('application/'); }
function shouldAttempt(file){ return typeof window.shouldAttemptDuration === 'function' ? window.shouldAttemptDuration(file) : localShouldAttempt(file); }

async function readDuration(file){
  try {
    if (typeof window.getVideoDuration === 'function') {
      const r = await window.getVideoDuration(file);
      return r && Number.isFinite(r.duration) && r.duration > 0 ? { duration:r.duration, success:true } : { duration:0, success:false };
    }
  } catch (_) {}
  return parseDurationElementFallback(file);
}

function parseDurationElementFallback(file){
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const video = document.createElement('video');
    let done = false;
    video.preload = 'metadata';
    video.muted = true;
    video.playsInline = true;
    const finish = (duration, success) => { if (done) return; done = true; clearTimeout(timer); video.onloadedmetadata = video.ondurationchange = video.onerror = null; video.removeAttribute('src'); try { video.load(); } catch (_) {} URL.revokeObjectURL(url); resolve({ duration, success }); };
    const read = () => { const d = Number.isFinite(video.duration) && video.duration > 0 ? video.duration : 0; if (d > 0) finish(d, true); };
    const timer = setTimeout(() => finish(0, false), 45000);
    video.onloadedmetadata = read;
    video.ondurationchange = read;
    video.onerror = () => finish(0, false);
    video.src = url;
    video.load();
  });
}

async function collectFromHandle(dirHandle, discovery){
  const files = [];
  for await (const [, entry] of dirHandle.entries()) {
    try {
      if (entry.kind === 'file') {
        const f = await entry.getFile();
        discovery.totalFiles++;
        if (shouldAttempt(f)) files.push(f); else discovery.ignoredFiles++;
      } else if (entry.kind === 'directory') {
        files.push(...await collectFromHandle(entry, discovery));
      }
    } catch (_) { discovery.ignoredFiles++; }
  }
  return files;
}

function readEntryRecursive(entry, discovery){
  return new Promise(resolve => {
    if (!entry) return resolve([]);
    if (entry.isFile) {
      entry.file(f => { discovery.totalFiles++; if (shouldAttempt(f)) resolve([f]); else { discovery.ignoredFiles++; resolve([]); } }, () => { discovery.ignoredFiles++; resolve([]); });
      return;
    }
    if (!entry.isDirectory) return resolve([]);
    const reader = entry.createReader();
    const entries = [];
    const readBatch = () => reader.readEntries(async batch => {
      if (!batch.length) { const out = []; for (const child of entries) out.push(...await readEntryRecursive(child, discovery)); resolve(out); }
      else { entries.push(...batch); readBatch(); }
    }, () => resolve([]));
    readBatch();
  });
}

$('fsApiBtn').addEventListener('click', async () => {
  if (S.scanning) return;
  if (!window.showDirectoryPicker) { $('legacyInput').click(); return; }
  try {
    const handle = await window.showDirectoryPicker({ mode:'read' });
    const discovery = { totalFiles:0, ignoredFiles:0 };
    const files = await collectFromHandle(handle, discovery);
    await startScan(files, handle.name || 'Selected Folder', discovery);
  } catch (e) { if (e.name !== 'AbortError') toast('Could not open folder.'); }
});

$('legacyInput').addEventListener('change', async e => {
  if (S.scanning) return;
  const all = Array.from(e.target.files || []);
  const files = all.filter(shouldAttempt);
  const folderName = files[0]?.webkitRelativePath?.split('/')?.[0] || all[0]?.webkitRelativePath?.split('/')?.[0] || 'Selected Folder';
  await startScan(files, folderName, { totalFiles:all.length, ignoredFiles:all.length - files.length });
  e.target.value = '';
});

const dropZone = $('dropZone');
['dragenter','dragover'].forEach(type => dropZone.addEventListener(type, e => { e.preventDefault(); dropZone.classList.add('drop-active'); }));
['dragleave','dragend','drop'].forEach(type => dropZone.addEventListener(type, () => dropZone.classList.remove('drop-active')));
dropZone.addEventListener('drop', async e => {
  e.preventDefault();
  if (S.scanning) return;
  const items = Array.from(e.dataTransfer.items || []);
  const discovery = { totalFiles:0, ignoredFiles:0 };
  try {
    if (items[0]?.getAsFileSystemHandle) {
      const handle = await items[0].getAsFileSystemHandle();
      if (handle.kind === 'directory') {
        const files = await collectFromHandle(handle, discovery);
        await startScan(files, handle.name || 'Dropped Folder', discovery);
        return;
      }
    }
    const entry = items[0]?.webkitGetAsEntry?.();
    if (entry?.isDirectory) {
      const files = await readEntryRecursive(entry, discovery);
      await startScan(files, entry.name || 'Dropped Folder', discovery);
    } else toast('Please drop a folder, not individual files.');
  } catch (_) { toast('Could not read dropped folder.'); }
});

$('cancelBtn').addEventListener('click', () => { S.cancelled = true; });
$('newScanBtn').addEventListener('click', () => { $('resultsSection').hidden = true; S.results = null; window.scrollTo({ top:0, behavior:'smooth' }); });
$('saveBtn').addEventListener('click', () => { if (!S.results) return; const scans = getHistory(); scans.unshift(S.results); localStorage.setItem('vrt-history-v7', JSON.stringify(scans.slice(0,20))); renderHistory(); toast('Saved.'); });
$('clearAllBtn').addEventListener('click', () => { localStorage.removeItem('vrt-history-v7'); renderHistory(); });
$('csvBtn').addEventListener('click', exportCSV);
$('copyBtn').addEventListener('click', copySummary);

async function startScan(files, folderName, discovery){
  S.discovery = discovery;
  if (!files.length) { toast('No videos or scan candidates found.'); return; }
  S.scanning = true; S.cancelled = false; S.results = null;
  $('resultsSection').hidden = true; $('scanSection').hidden = false; $('scanFolder').textContent = folderName;
  $('progressFill').style.width = '0%'; $('progressFill').classList.remove('done'); $('scanEta').textContent = '';
  $('scanCount').textContent = `0 / ${files.length} videos`; $('scanFile').textContent = `Found ${discovery.totalFiles} files · scanning ${files.length} · ignored ${discovery.ignoredFiles}`;
  window.scrollTo({ top:$('scanSection').offsetTop - 20, behavior:'smooth' });
  const started = Date.now(); let next = 0, processed = 0; const results = [];
  async function slot(){
    while (!S.cancelled && next < files.length) {
      const file = files[next++];
      $('scanFile').textContent = pathOf(file);
      const r = await readDuration(file);
      results.push({ name:pathOf(file), duration:r.success ? r.duration : 0, success:!!r.success, ext:fileExt(file), size:file.size || 0 });
      processed++;
      const elapsed = Math.max(.001, (Date.now() - started) / 1000);
      const eta = Math.round((files.length - processed) / (processed / elapsed));
      $('progressFill').style.width = Math.round(processed / files.length * 100) + '%';
      $('scanCount').textContent = `${processed} / ${files.length} videos`;
      $('scanEta').textContent = processed < files.length ? `ETA: ${formatEta(eta)}` : '';
    }
  }
  await Promise.all(Array.from({ length:Math.min(TOTAL_CONCURRENCY, files.length) }, slot));
  S.scanning = false;
  if (S.cancelled) { $('scanSection').hidden = true; toast('Scan cancelled.'); return; }
  const totalDuration = results.reduce((s, r) => s + (r.success ? r.duration : 0), 0);
  const failedCount = results.filter(r => !r.success).length;
  S.results = { id:'scan_' + Date.now(), folderName, timestamp:Date.now(), totalDuration, fileCount:files.length, failedCount, discovery, files:results };
  $('progressFill').classList.add('done'); $('progressFill').style.width = '100%'; $('scanEta').textContent = 'Complete'; $('scanFile').textContent = '';
  showResults();
}

function showResults(){
  const r = S.results;
  $('scanSection').hidden = true; $('resultsSection').hidden = false;
  $('tcValue').textContent = formatTC(r.totalDuration);
  $('tcSub').textContent = `${r.folderName} · ${r.fileCount} videos/candidates · found ${r.discovery.totalFiles} files, ignored ${r.discovery.ignoredFiles}${r.failedCount ? ' · ' + r.failedCount + ' failed' : ''}`;
  $('failNotice').innerHTML = r.failedCount ? `<div class="warn">${r.failedCount} file(s) were found but their duration could not be read in the browser. Export CSV to see exact filenames/extensions.</div>` : '';
  const rows = [...r.files].sort((a,b) => a.name.localeCompare(b.name)).map(f => `<tr><td title="${esc(f.name)}">${esc(f.name)}</td><td class="dur ${f.success ? '' : 'fail'}">${f.success ? formatTC(f.duration) : '—'}</td><td class="${f.success ? '' : 'fail'}">${f.success ? 'ok' : 'failed'}${f.ext ? ' · .' + esc(f.ext) : ''}</td></tr>`).join('');
  $('fileTableBody').innerHTML = rows;
}

function getHistory(){ try { return JSON.parse(localStorage.getItem('vrt-history-v7') || '[]'); } catch { return []; } }
function renderHistory(){ const scans = getHistory(); $('historyList').innerHTML = scans.length ? scans.map(s => `<div class="hist-item"><div><div class="hist-title">${esc(s.folderName)}</div><div class="hist-meta">${s.fileCount} videos · ${new Date(s.timestamp).toLocaleString()}${s.failedCount ? ' · ' + s.failedCount + ' failed' : ''}</div></div><div class="hist-dur">${formatTC(s.totalDuration)}</div></div>`).join('') : '<p class="muted">No scans saved yet.</p>'; }
function exportCSV(){ const r = S.results; if (!r) return; const rows = [['Filename','Extension','Size bytes','Duration seconds','Duration H:MM:SS','Status']]; r.files.forEach(f => rows.push([f.name, f.ext, f.size, f.success ? f.duration.toFixed(3) : '', f.success ? formatTC(f.duration) : '', f.success ? 'ok' : 'failed'])); const csv = rows.map(row => row.map(cell => '"' + String(cell ?? '').replace(/"/g,'""') + '"').join(',')).join('\n'); const a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv); a.download = `${r.folderName}_runtime.csv`; a.click(); }
async function copySummary(){ const r = S.results; if (!r) return; const text = `Video Runtime Tracker\nFolder: ${r.folderName}\nRuntime: ${formatTC(r.totalDuration)} (${formatHMS(r.totalDuration)})\nFiles: ${r.fileCount} videos/candidates\nFailed: ${r.failedCount}\nBuild: ${BUILD}`; try { await navigator.clipboard.writeText(text); toast('Copied.'); } catch { toast('Copy failed.'); } }
function formatTC(secs){ const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=Math.floor(secs%60); return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function formatHMS(secs){ const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=Math.floor(secs%60); return [h && h+'h', m && m+'m', s+'s'].filter(Boolean).join(' '); }
function formatEta(secs){ if (!Number.isFinite(secs) || secs < 0) return ''; if (secs < 60) return secs + 's'; return Math.floor(secs/60) + 'm ' + (secs % 60) + 's'; }
let toastTimer = null; function toast(msg){ const t=$('toast'); t.textContent=msg; t.className='show'; clearTimeout(toastTimer); toastTimer=setTimeout(() => t.className='', 3000); }
</script>
</body>
</html>
